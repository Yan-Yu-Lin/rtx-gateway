# HAProxy sends PROXY protocol to nginx on 127.0.0.1:8443.
set_real_ip_from 127.0.0.1;
real_ip_header proxy_protocol;

map $http_authorization $rtx_unauth_key {
    default "";
    "" $binary_remote_addr;
}

map $http_authorization $rtx_auth_key {
    default $binary_remote_addr;
    "" "";
}

limit_req_zone $rtx_unauth_key zone=rtx_unauth:10m rate=30r/m;
limit_req_zone $rtx_auth_key zone=rtx_auth:10m rate=300r/m;
limit_req_zone $binary_remote_addr zone=gateway_login:10m rate=5r/m;
